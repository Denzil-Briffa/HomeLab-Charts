replicaCount: 1

revisionHistoryLimit: 5

minReadySeconds: 5

terminationGracePeriodSeconds: 30

strategy:
  type: RollingUpdate

podLabels: {}

podAnnotations: {}

podSecurityContext: {}

affinity: {}

topologySpreadConstraints: []

tolerations: []

nodeSelector: {}

containers:
  - name: app
    image:
      repository: nginx
      tag: stable
      pullPolicy: IfNotPresent
    ports:
      - name: http
        containerPort: 80
        protocol: TCP
    env: []
    envFrom: []
    command: []
    args: []
    resources: {}
    securityContext: {}
    volumeMounts: []
    livenessProbe: {}
    readinessProbe: {}
    startupProbe: {}

initContainers: []

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

httpRoute:
  enabled: false
  annotations: {}
  hostnames: []
  parentRefs: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ""
          port: 80

persistentVolumeClaims: []

volumes: []
