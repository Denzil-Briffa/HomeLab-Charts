{{- $fullName := include "homelab.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  labels:
    app.kubernetes.io/name: {{ include "homelab.name" . }}
    helm.sh/chart: {{ include "homelab.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
{{ toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "homelab.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "homelab.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.podLabels }}
{{ toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- range .Values.containers }}
        - name: {{ .name }}
          image: {{ .image.repository }}:{{ .image.tag }}
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          {{- with .command }}
          command:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .args }}
          args:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .env }}
          env:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .envFrom }}
          envFrom:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .ports }}
          ports:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .volumeMounts }}
          volumeMounts:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .startupProbe }}
          startupProbe:
{{ toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- range . }}
        - name: {{ .name }}
          {{- if .persistentVolumeClaim }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-%s" $fullName .name) .persistentVolumeClaim.claimName }}
          {{- else if .configMap }}
          configMap:
{{ toYaml .configMap | nindent 12 }}
          {{- else if .secret }}
          secret:
{{ toYaml .secret | nindent 12 }}
          {{- else if .emptyDir }}
          emptyDir:
{{ toYaml .emptyDir | nindent 12 }}
          {{- else if .hostPath }}
          hostPath:
{{ toYaml .hostPath | nindent 12 }}
          {{- else if .nfs }}
          nfs:
{{ toYaml .nfs | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- end }}
