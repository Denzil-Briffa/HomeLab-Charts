replicaCount: 1

revisionHistoryLimit: 10

strategy:
  type: Recreate

podLabels:
  app.kubernetes.io/component: media

podAnnotations:
  prometheus.io/scrape: "false"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: homelab

tolerations:
  - effect: NoExecute
    key: node.kubernetes.io/not-ready
    operator: Exists
    tolerationSeconds: 300

containers:
  - name: app
    image:
      repository: lscr.io/linuxserver/nzbget
      tag: latest
      pullPolicy: IfNotPresent
    ports:
      - name: http
        containerPort: 6789
    env:
      - name: TZ
        value: Europe/Malta
      - name: PUID
        value: "1000"
      - name: PGID
        value: "1000"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    volumeMounts:
      - name: config
        mountPath: /config
      - name: downloads
        mountPath: /downloads
    livenessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 30
    readinessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 10
  - name: metrics
    image:
      repository: nginx
      tag: stable
      pullPolicy: IfNotPresent
    ports:
      - name: metrics
        containerPort: 9113
    resources: {}

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 6789
      targetPort: http
    - name: metrics
      port: 9113
      targetPort: metrics

httpRoute:
  enabled: true
  hostnames:
    - nzbget.homelab
  parentRefs:
    - name: default-gateway
      namespace: networking
      sectionName: home-lan
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - port: 6789

persistentVolumeClaims:
  - name: config
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: datastore
  - name: downloads
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    storageClassName: datastore

volumes:
  - name: config
    persistentVolumeClaim:
      claimName: config
  - name: downloads
    persistentVolumeClaim:
      claimName: downloads
